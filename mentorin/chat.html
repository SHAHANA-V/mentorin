<!DOCTYPE html>
<html>
<head>
  <title>Mentorin | Chat</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="chat-page">

  <!-- LEFT : CONTACT LIST -->
  <aside class="chat-sidebar">
    <h3>Messages</h3>

    <div class="chat-user active">
      <img src="https://i.pravatar.cc/40?img=12">
      <div>
        <h4>Ravi Kumar</h4>
        <span>Mentor · Software</span>
      </div>
    </div>

    <div class="chat-user">
      <img src="https://i.pravatar.cc/40?img=32">
      <div>
        <h4>Anita Sharma</h4>
        <span>Mentor · Data Science</span>
      </div>
    </div>
  </aside>

  <!-- RIGHT : CHAT WINDOW -->
  <main class="chat-main">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="chat-header-user">
        <img src="https://i.pravatar.cc/45?img=12">
        <div>
          <h4>Ravi Kumar</h4>
          <span>Senior Software Engineer</span>
        </div>
      </div>
      <span class="badge verified">✔ Verified</span>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages" id="chatMessages">
      <div class="message received">
        Hi! How can I help you with your career?
      </div>
    </div>

    <!-- INPUT -->
    <div class="chat-input">
      <input id="chatInput" placeholder="Type a professional message...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </main>

</div>

<script src="js/chat.js"></script>
</body>
</html>
